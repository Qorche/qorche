name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write

jobs:
  # Detect whether source code changed — used to skip expensive jobs on docs-only PRs
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.kt'
              - '**/*.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/ci.yml'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, blacksmith-4vcpu-windows-2025]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v6

      # Run detekt + tests in a single Gradle invocation with --parallel
      # so Gradle can overlap module tasks (e.g. detekt on core while compiling agent).
      # --continue ensures tests still run even if detekt fails.
      - name: Run Detekt and tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew detekt test koverXmlReport --parallel --continue

      - name: Run Detekt and tests
        if: matrix.os != 'ubuntu-latest'
        run: ./gradlew detekt test --parallel --continue

      - name: Upload Detekt merged report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report-${{ matrix.os }}
          path: build/reports/detekt/

      - name: Upload Detekt SARIF to GitHub Code Scanning
        if: always() && matrix.os == 'ubuntu-latest'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/merged.sarif
          category: detekt

      - name: Post coverage to PR
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "## Coverage Report"
          update-comment: true
          min-coverage-overall: 60
          min-coverage-changed-files: 60

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/reports/kover/

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}
          path: '**/build/reports/tests/'

  # Gate job — the single required status check for branch protection.
  # Always runs: passes when tests pass or were skipped (docs-only PRs),
  # fails when tests fail.
  gate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" || "${{ needs.changes.result }}" == "cancelled" ]]; then
            echo "Changes detection failed or was cancelled"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "Tests failed or were cancelled"
            exit 1
          fi
          echo "Tests passed or were skipped — gate OK"
